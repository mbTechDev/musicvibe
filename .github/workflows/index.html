<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicVibe Player</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
      }

      /* ===== BEAUTIFUL HEADER ===== */
      header {
        position: sticky;
        top: 0;
        width: 100%;
        background: #fff;
        box-shadow: 0px 0px 8px #ccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        box-sizing: border-box;
        z-index: 1000;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      nav {
        display: flex;
        gap: 25px;
      }
      nav a {
        text-decoration: none;
        color: rgb(114, 114, 114);
        font-size: 14px;
        position: relative;
        transition: 0.3s;
      }
      nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -5px;
        width: 0%;
        height: 2px;
        background: #00ffee;
        transition: 0.3s;
      }
      nav a:hover::after {
        width: 100%;
      }
      .menu-toggle {
        display: none;
        font-size: 24px;
        cursor: pointer;
      } /* ===== MOBILE ===== */
      @media (max-width: 768px) {
        header {
          padding: 15px !important;
        }
        nav {
          position: absolute;
          top: 63px;
          right: 0;
          background: rgba(15, 15, 26, 0.95);
          flex-direction: column;
          width: 200px;
          padding: 20px;
          display: none;
        }
        nav.active {
          display: flex;
        }
        .menu-toggle {
          display: block;
        }
      }
      .logo {
        font-size: 22px;
        font-weight: bold;
        background: linear-gradient(90deg, #ff00cc, #00ffee, #ff00cc);
        background-size: 200% auto;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        animation: shine 3s linear infinite;
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      .player-section {
        width: 90%;
        max-width: 900px;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .video-wrapper {
        position: relative;
        padding-top: 56.25%;
      }
      .video-wrapper iframe {
        position: absolute;
        top: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .controls {
        position: relative; /* for buffer text positioning */
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px 15px;
        background: #111;
        color: #fff;
      }

      button {
        background: none;
        border: none;
        color: #00ffee;
        font-size: 18px;
        cursor: pointer;
      }

      .time {
        font-size: 13px;
        min-width: 100px;
      }

      .progress-container {
        flex: 1;
        height: 6px;
        background: #333;
        border-radius: 6px;
        cursor: pointer;
        position: relative;
      }

      .progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00ffee, #00aaff);
        border-radius: 6px;
        transition: width 0.1s linear;
      }

      .buffer {
        color: #ff4d4d;
        font-size: 12px;
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        background: rgba(0, 0, 0, 0.5);
        padding: 2px 6px;
        border-radius: 4px;
        display: none;
      }

      .video-list {
        width: 400px;
        height: fit-content;
        max-width: 900px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .video-item {
        padding: 10px 15px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .video-item img {
        width: 65px;
        height: 45px;
        object-fit: cover;
        border-radius: 4px;
      }

      .video-item:hover {
        background: #f0f0f0;
      }
      .active-video {
        background: #e0ffff;
        font-weight: bold;
      }
      .wrp {
        display: flex;
        width: 1140px;
        margin: auto;
        padding: 15px 0px;
        gap: 15px;
        padding-top: 30px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">🎵 MusicVibe</div>
      <nav id="nav">
        <a href="#">Home</a> <a href="#">Videos</a> <a href="#">Playlist</a>
        <a href="#">Contact</a>
      </nav>
      <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </header>

    <div class="wrp">
      <div class="player-section">
        <div class="video-wrapper">
          <iframe
            id="mainPlayer"
            src="https://player.vimeo.com/video/1169157236?controls=0"
            allow="autoplay; fullscreen"
            allowfullscreen
          ></iframe>
        </div>

        <div class="controls">
          <button id="playBtn">▶</button>
          <div class="time" id="timeDisplay">0:00 / 0:00</div>
          <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
          </div>
          <button id="fullscreenBtn">⛶</button>
          <span class="buffer" id="bufferText">Buffering...</span>
        </div>
      </div>

      <div class="video-list" id="videoList"></div>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
      const videos = [
        { id: "1169157236", title: "Tera Naam Hawaon Mein" },
        { id: "1169636573", title: "স্রোতের প্রবাহ" },
        { id: "1169658767", title: "স্রোতস্বিনী (Reverb)" },
      ];

      const iframe = document.getElementById("mainPlayer");
      const player = new Vimeo.Player(iframe);

      const playBtn = document.getElementById("playBtn");
      const progress = document.getElementById("progress");
      const progressContainer = document.getElementById("progressContainer");
      const timeDisplay = document.getElementById("timeDisplay");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const bufferText = document.getElementById("bufferText");
      const videoList = document.getElementById("videoList");

      let duration = 0;
      let isReady = false;
      let isDragging = false;

      /* Create video list with thumbnails */
      videos.forEach((video, index) => {
        const item = document.createElement("div");
        item.className = "video-item";

        const thumb = document.createElement("img");
        const title = document.createElement("span");
        title.textContent = video.title;

        item.appendChild(thumb);
        item.appendChild(title);

        if (index === 0) item.classList.add("active-video");

        // Fetch thumbnail from Vimeo oEmbed
        fetch(
          `https://vimeo.com/api/oembed.json?url=https://vimeo.com/${video.id}`,
        )
          .then((res) => res.json())
          .then((data) => {
            thumb.src = data.thumbnail_url;
          })
          .catch((err) => console.error(err));

        item.onclick = () => {
          document
            .querySelectorAll(".video-item")
            .forEach((i) => i.classList.remove("active-video"));
          item.classList.add("active-video");
          loadVideo(video.id);
        };

        videoList.appendChild(item);
      });

      /* Format time */
      function format(t) {
        const m = Math.floor(t / 60);
        const s = Math.floor(t % 60)
          .toString()
          .padStart(2, "0");
        return m + ":" + s;
      }

      /* Load video */
      function loadVideo(id) {
        isReady = false;
        progress.style.width = "0%";
        timeDisplay.textContent = "0:00 / 0:00";
        playBtn.textContent = "▶";
        bufferText.style.display = "inline";

        player
          .loadVideo(id)
          .then(() => player.getDuration())
          .then((d) => {
            duration = d;
            isReady = true;
            timeDisplay.textContent = "0:00 / " + format(duration);
            player.play();
          })
          .catch((err) => console.error(err));
      }

      /* Player events */
      player.on("timeupdate", (data) => {
        if (!isReady || isDragging) return;
        let percent = (data.seconds / duration) * 100;
        if (percent > 99.8) percent = 99.8;
        progress.style.width = percent + "%";
        timeDisplay.textContent =
          format(data.seconds) + " / " + format(duration);
      });

      player.on("play", () => {
        playBtn.textContent = "⏸";
        bufferText.style.display = "none";
      });
      player.on("pause", async () => {
        if (!(await player.getEnded())) playBtn.textContent = "▶";
      });
      player.on("bufferstart", () => {
        bufferText.style.display = "inline";
      });
      player.on("bufferend", () => {
        if (!isDragging) bufferText.style.display = "none";
      });
      player.on("ended", () => {
        progress.style.width = "100%";
        playBtn.textContent = "▶";
      });

      /* Play/Pause button */
      playBtn.onclick = async () => {
        const paused = await player.getPaused();
        if (paused) player.play();
        else player.pause();
      };

      /* Draggable progress bar */
      function seek(e) {
        if (!isReady) return;
        const rect = progressContainer.getBoundingClientRect();
        let percent = (e.clientX - rect.left) / rect.width;
        percent = Math.max(0, Math.min(1, percent));
        const newTime = percent * duration;
        progress.style.width = percent * 100 + "%";
        bufferText.style.display = "inline";
        player.setCurrentTime(newTime).then(() => {
          if (!isDragging) bufferText.style.display = "none";
        });
      }

      progressContainer.addEventListener("mousedown", (e) => {
        isDragging = true;
        seek(e);
      });
      window.addEventListener("mousemove", (e) => {
        if (isDragging) seek(e);
      });
      window.addEventListener("mouseup", (e) => {
        if (isDragging) {
          seek(e);
          isDragging = false;
          bufferText.style.display = "none";
        }
      });

      /* Fullscreen */
      fullscreenBtn.onclick = () => {
        if (!document.fullscreenElement) iframe.requestFullscreen();
        else document.exitFullscreen();
      };

      /* Initialize first video duration */
      player.getDuration().then((d) => {
        duration = d;
        isReady = true;
        timeDisplay.textContent = "0:00 / " + format(duration);
      });

      function toggleMenu() {
        document.getElementById("nav").classList.toggle("active");
      }
    </script>
  </body>
</html>
